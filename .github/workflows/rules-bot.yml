name: Rules Bot

on:
  pull_request:
    paths:
      - 'rules/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v7

      - name: Checkout base branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate rules
        id: validate
        run: |
          set +e
          OUTPUT=$(npm run validate:rules 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<RULES_EOF"
            echo "$OUTPUT"
            echo "RULES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Diff rules and build summary
        id: diff
        run: |
          SUMMARY=""
          PLATFORMS="win32 darwin linux"
          APP_FILES="apps.json gaming.json gpu-cache.json"

          for platform in $PLATFORMS; do
            for file in $APP_FILES; do
              PR_FILE="rules/$platform/$file"
              BASE_FILE="base/rules/$platform/$file"

              [ ! -f "$PR_FILE" ] && continue
              [ ! -f "$BASE_FILE" ] && continue

              # Extract IDs from both versions
              PR_IDS=$(node -e "const d=JSON.parse(require('fs').readFileSync('$PR_FILE','utf-8')); (d.apps||[]).forEach(a=>console.log(a.id))")
              BASE_IDS=$(node -e "const d=JSON.parse(require('fs').readFileSync('$BASE_FILE','utf-8')); (d.apps||[]).forEach(a=>console.log(a.id))")

              # Find added IDs
              ADDED=$(comm -23 <(echo "$PR_IDS" | sort) <(echo "$BASE_IDS" | sort))
              # Find removed IDs
              REMOVED=$(comm -13 <(echo "$PR_IDS" | sort) <(echo "$BASE_IDS" | sort))

              if [ -n "$ADDED" ]; then
                for id in $ADDED; do
                  NAME=$(node -e "const d=JSON.parse(require('fs').readFileSync('$PR_FILE','utf-8')); const a=(d.apps||[]).find(x=>x.id==='$id'); a&&console.log(a.name)")
                  SUMMARY="$SUMMARY\n- ✅ Added **$NAME** (\`$id\`) to \`$platform/$file\`"
                done
              fi

              if [ -n "$REMOVED" ]; then
                for id in $REMOVED; do
                  NAME=$(node -e "const d=JSON.parse(require('fs').readFileSync('$BASE_FILE','utf-8')); const a=(d.apps||[]).find(x=>x.id==='$id'); a&&console.log(a.name)")
                  SUMMARY="$SUMMARY\n- ❌ Removed **$NAME** (\`$id\`) from \`$platform/$file\`"
                done
              fi
            done
          done

          if [ -z "$SUMMARY" ]; then
            SUMMARY="\n- _Non-app rule changes detected (system, browsers, databases, etc.)_"
          fi

          {
            echo "summary<<DIFF_EOF"
            echo -e "$SUMMARY"
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v9
        env:
          EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
          VALIDATE_OUTPUT: ${{ steps.validate.outputs.output }}
          DIFF_SUMMARY: ${{ steps.diff.outputs.summary }}
        with:
          script: |
            const exitCode = process.env.EXIT_CODE;
            const validateOutput = process.env.VALIDATE_OUTPUT;
            const diffSummary = process.env.DIFF_SUMMARY;

            const statusEmoji = exitCode === '0' ? '✅' : '❌';
            const statusText = exitCode === '0' ? 'All rules are valid' : 'Validation failed';

            const body = [
              `## 🧹 Rules Bot`,
              ``,
              `### Changes`,
              diffSummary,
              ``,
              `### Validation ${statusEmoji}`,
              `${statusText}`,
              ``,
              `<details><summary>Full validation output</summary>`,
              ``,
              '```',
              validateOutput,
              '```',
              `</details>`,
            ].join('\n');

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 🧹 Rules Bot')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if validation failed
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1
