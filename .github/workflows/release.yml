name: Release LightClean

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run package:win
          - os: macos-latest
            command: npm run package:mac
          - os: ubuntu-latest
            command: npm run package:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}" || {
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}"
            exit 1
          }
      - name: Test
        run: npm test
      - name: Package
        run: ${{ matrix.command }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lightclean-${{ runner.os }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" release-assets/* --repo "${{ github.repository }}" --verify-tag --title "轻净 LightClean ${{ github.ref_name }}" --generate-notes
