name: License Check

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json

jobs:
  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;SSPL-1.0;EUPL-1.1;EUPL-1.2" --summary
